<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Geo Pinas — Interactive Philippine Province Map</title>
    <meta name="description" content="Explore all 83 Philippine provinces on an interactive map. Check live weather, track your travel level, take province quizzes, and discover fun facts about the Philippines. Free and open source." />
    <meta name="keywords" content="Philippines map, Philippine provinces, interactive map, Philippines travel, province quiz, Philippines weather, Geo Pinas, explore Philippines, NCR, Luzon, Visayas, Mindanao" />
    <meta name="author" content="Geo Pinas" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://iam-phasma.github.io/Geo-Pinas/" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://iam-phasma.github.io/Geo-Pinas/" />
    <meta property="og:title" content="Geo Pinas — Interactive Philippine Province Map" />
    <meta property="og:description" content="Explore all 83 Philippine provinces on an interactive map. Check live weather, track your travel level, take province quizzes, and discover fun facts about the Philippines." />
    <meta property="og:image" content="https://iam-phasma.github.io/Geo-Pinas/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_PH" />
    <meta property="og:site_name" content="Geo Pinas" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://iam-phasma.github.io/Geo-Pinas/" />
    <meta name="twitter:title" content="Geo Pinas — Interactive Philippine Province Map" />
    <meta name="twitter:description" content="Explore all 83 Philippine provinces on an interactive map. Live weather, travel tracking, quizzes, and fun facts — free and open source." />
    <meta name="twitter:image" content="https://iam-phasma.github.io/Geo-Pinas/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Geo Pinas",
      "url": "https://iam-phasma.github.io/Geo-Pinas/",
      "description": "Explore all 83 Philippine provinces on an interactive map. Check live weather, track your travel level, take province quizzes, and discover fun facts about the Philippines.",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "All",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Iam-Phasma"
      },
      "keywords": "Philippines, provinces, interactive map, travel tracker, weather, quiz",
      "inLanguage": "en-PH",
      "isAccessibleForFree": true,
      "thumbnailUrl": "https://iam-phasma.github.io/Geo-Pinas/og-image.png"
    }
    </script>
  </head>
  <body>
    <div id="app">
      <div id="mobile-backdrop" aria-hidden="true"></div>
      <header id="header">
        <div class="header-left">
          <img src="favicon.svg" alt="Geo Pinas icon" class="header-icon" aria-hidden="true" />
          <span class="logo">Geo Pinas</span>
          <span class="tagline">Philippine Province Map</span>
        </div>
        <div class="header-right">
          <span id="status" class="status status--loading">Loading…</span>
        </div>
      </header>

      <main id="main">
        <div id="map-wrap">
          <svg
            id="map"
            role="img"
            aria-label="Interactive map of Philippine provinces"
          ></svg>
          <div id="tooltip" class="tooltip" aria-live="polite"></div>
          <div id="zoom-controls" aria-label="Map zoom controls">
            <button id="zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
            <button id="zoom-reset" title="Reset view" aria-label="Reset view">
              ⊙
            </button>
            <button id="zoom-out" title="Zoom out" aria-label="Zoom out">
              −
            </button>
          </div>

          <!-- Settings panel (top-right, appears on cursor proximity) -->
          <div id="settings-trigger" aria-label="Map settings">
            <button id="settings-btn" aria-label="Map Settings" title="Map Settings">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
            <div id="settings-panel">
              <div class="sp-title">SETTINGS</div>
              <div class="sp-row">
                <span class="sp-row-name">Dark Mode</span>
                <button class="sp-toggle" id="darkmode-toggle" role="switch" aria-checked="false" title="Toggle dark mode">
                  <span class="sp-toggle-track"><span class="sp-toggle-thumb"></span></span>
                </button>
              </div>
              <div class="sp-row">
                <span class="sp-row-name">Sea Texture</span>
                <button class="sp-toggle" id="sea-texture-toggle" role="switch" aria-checked="true" title="Toggle sea texture">
                  <span class="sp-toggle-track"><span class="sp-toggle-thumb"></span></span>
                </button>
              </div>
              <div class="sp-row">
                <span class="sp-row-name">Province Borders</span>
                <button class="sp-toggle" id="borders-toggle" role="switch" aria-checked="true" title="Toggle province borders">
                  <span class="sp-toggle-track"><span class="sp-toggle-thumb"></span></span>
                </button>
              </div>
              <div class="sp-row-block">
                <div class="sp-row">
                  <span class="sp-row-name">Sea Color</span>
                  <button class="sp-icon-btn" id="sea-color-reset" title="Reset sea color">↺</button>
                </div>
                <input type="range" id="sea-color-slider" class="sp-slider sp-slider--sea" min="0" max="100" value="66">
              </div>
              <div class="sp-row-block">
                <div class="sp-row">
                  <span class="sp-row-name">Land Color</span>
                  <button class="sp-icon-btn" id="land-color-reset" title="Reset land color">↺</button>
                </div>
                <input type="range" id="land-color-slider" class="sp-slider sp-slider--land" min="0" max="100" value="50">
              </div>
              <div class="sp-row-block">
                <div class="sp-row">
                  <span class="sp-row-name">Border Color</span>
                </div>
                <div class="sp-swatches" id="border-swatches">
                  <button class="sp-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
                  <button class="sp-swatch" data-color="#000000" style="background:#000000" title="Black"></button>
                  <button class="sp-swatch" data-color="#95ffc1" style="background:#95ffc1" title="Mint" aria-pressed="true"></button>
                  <button class="sp-swatch" data-color="#4ade80" style="background:#4ade80" title="Green"></button>
                  <button class="sp-swatch" data-color="#166e3e" style="background:#166e3e" title="Dark Green"></button>
                  <button class="sp-swatch" data-color="#0a3d1f" style="background:#0a3d1f" title="Darkest Green"></button>
                </div>
              </div>
            </div>
          </div>

          <!-- Mobile FAB: opens tools sheet (visible on ≤640px) -->
          <button id="mobile-fab" aria-label="Open tools panel" title="Open tools">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Tools
          </button>

          <!-- Weather emoji overlay (positioned per selected province) -->
          <div id="weather-overlay" aria-hidden="true"></div>

          <!-- Travel level picker popup (appears over map on province click) -->
          <div id="tl-picker-popup" class="tl-picker-popup" aria-hidden="true"></div>
        </div>

        <aside id="sidebar" aria-label="Province information">
          <div class="sidebar-inner">
            <!-- Drag handle — visible only on mobile -->
            <div class="mobile-sheet-handle" aria-hidden="true"><span class="mobile-sheet-grip"></span></div>
            <div class="sidebar-header">
              <div class="sidebar-title" id="sidebar-title">Tools</div>
              <button
                id="sidebar-toggle"
                aria-label="Collapse sidebar"
                title="Collapse"
              >
                ‹
              </button>
            </div>
            <div id="info-panel"></div>
          </div>
        </aside>
      </main>

      <footer id="footer">
        <span>Data: PSGC 2023 · PSA Philippines</span>
        <span id="visitor-counter" title="Total site visitors" aria-live="polite">👀 <span id="visitor-count">—</span> visitors</span>
        <span
          >Geo Pinas ·
          <a
            href="https://github.com/OSSPhilippines/philippines-travel-level-map"
            target="_blank"
            rel="noopener noreferrer"
            >Map shapes</a
          ></span
        >
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <!-- Tools (must load after app.js; travel before roulette) -->
    <script src="js/tools/weather.js"></script>
    <script src="js/tools/quiz.js"></script>
    <script src="js/tools/travel.js"></script>
    <script src="js/tools/roulette.js"></script>
    <script src="js/tools/geoguesser.js"></script>
    <!-- Boot: runs last, after all tools are defined -->
    <script src="js/boot.js"></script>
  </body>
</html>
